# NPD 플러그인 런타임 매핑 테이블
# 추상 선언(tier, 추상 도구) → 구체 구현(모델, 실제 도구) 매핑

# ─────────────────────────────────────────────
# 티어 → LLM 모델 매핑
#   agentcard.yaml의 tier 값을 실제 모델에 매핑
#   전역 기본값(default) + 에이전트별 예외
# ─────────────────────────────────────────────
tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-7"
    HIGH:
      model: "claude-opus-4-7"
      #model: "claude-sonnet-4-6"
    MEDIUM:
      model: "claude-sonnet-4-6"
    LOW:
      model: "claude-haiku-4-5"

# ─────────────────────────────────────────────
# 추상 도구명 → 실제 도구 매핑
#   tools.yaml의 도구 선언을 실제 도구에 매핑
#   builtin 도구(Read, Write, Bash 등)는 런타임이 내장 처리하므로 생략
#   여기에는 mcp, custom 도구만 매핑
# ─────────────────────────────────────────────
tool_mapping:
  mcp_context7:
    - type: mcp
      server: "context7"
      tools: ["mcp__context7__query-docs", "mcp__context7__resolve-library-id"]

  mcp_playwright:
    - type: mcp
      server: "playwright"
      tools:
        - "mcp__pw__browser_navigate"
        - "mcp__pw__browser_navigate_back"
        - "mcp__pw__browser_snapshot"
        - "mcp__pw__browser_take_screenshot"
        - "mcp__pw__browser_resize"
        - "mcp__pw__browser_click"
        - "mcp__pw__browser_type"
        - "mcp__pw__browser_fill_form"
        - "mcp__pw__browser_select_option"
        - "mcp__pw__browser_press_key"
        - "mcp__pw__browser_hover"
        - "mcp__pw__browser_drag"
        - "mcp__pw__browser_drop"
        - "mcp__pw__browser_file_upload"
        - "mcp__pw__browser_handle_dialog"
        - "mcp__pw__browser_wait_for"
        - "mcp__pw__browser_evaluate"
        - "mcp__pw__browser_run_code"
        - "mcp__pw__browser_console_messages"
        - "mcp__pw__browser_network_requests"
        - "mcp__pw__browser_tabs"
        - "mcp__pw__browser_close"

  github_create_repo:
    - type: custom
      source: "resources/tools/create_repo/"
      tools: ["create_repo"]

  mermaid_check:
    - type: custom
      source: "resources/tools/check_mermaid/"
      tools: ["check_mermaid"]

# ─────────────────────────────────────────────
# 액션 카테고리 → 실제 도구 매핑
#   agentcard.yaml의 forbidden_actions를 실제 도구에 매핑
# ─────────────────────────────────────────────
action_mapping:
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
